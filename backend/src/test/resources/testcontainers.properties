# Maven expands @env.XDG_RUNTIME_DIR@ at build time (e.g. /run/user/1000).
# Spring Boot parent configures maven-resources-plugin to use @ as its delimiter,
# so ${...} placeholders in other files are never touched.
docker.host=unix:///run/user/1000/podman/podman.sock

# Ryuk requires privileged containers — not available in rootless Podman.
ryuk.disabled=true
