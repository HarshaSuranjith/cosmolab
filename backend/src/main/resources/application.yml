spring:
  application:
    name: cosmolab-backend

  datasource:
    url: jdbc:sqlserver://${MSSQL_HOST:sqlserver}:1433;databaseName=cosmolab;encrypt=false;trustServerCertificate=true
    username: ${MSSQL_USER:sa}
    password: ${MSSQL_PASSWORD:CosmoLab@2024}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
        session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 200

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://tempo:4317}

logging:
  level:
    com.arcticsurge.cosmolab: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-produces-media-type: application/json
