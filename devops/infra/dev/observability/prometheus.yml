global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cosmolab-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["cosmolab-backend:8080"]

  # RabbitMQ Prometheus plugin — independent of backend; survives RabbitMQ restarts
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]
