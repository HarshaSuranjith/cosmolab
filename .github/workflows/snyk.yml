name: Snyk

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    # Weekly full scan — Monday 03:00 UTC (offset from CodeQL at 02:00)
    - cron: '0 3 * * 1'

jobs:
  dependency-scan:
    name: Dependency & supply-chain scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master
        # Production note: pin to a commit SHA instead of @master to avoid
        # supply-chain risk in the scanner itself, e.g.:
        # uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      # Pre-populate Maven cache so Snyk can resolve the full dependency tree
      # (snyk test calls mvn dependency:tree internally)
      - name: Resolve Maven dependencies
        run: mvn -B dependency:resolve -DskipTests -f backend/pom.xml

      # --severity-threshold=high: report HIGH and CRITICAL only
      # continue-on-error: SARIF is uploaded even when vulnerabilities are found;
      # alerts appear in the Security tab rather than blocking the build outright
      - name: Snyk test
        run: |
          snyk test \
            --file=backend/pom.xml \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
          category: snyk-dependency

      # snyk monitor records a dependency snapshot in the Snyk dashboard for
      # continuous new-CVE alerting — run on master push only, not on every PR
      - name: Snyk monitor
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          snyk monitor \
            --file=backend/pom.xml \
            --project-name=cosmolab-backend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
