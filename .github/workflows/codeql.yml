name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    # Weekly full scan — Monday 02:00 UTC
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # security-and-quality includes OWASP-aligned queries on top of the
          # default security-extended suite (injection, path traversal, XXE, etc.)
          queries: security-and-quality

      # Compile only — tests require live SQL Server + RabbitMQ containers
      # which are not available in the CodeQL runner.
      - name: Build
        run: mvn -B compile -DskipTests -f backend/pom.xml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
