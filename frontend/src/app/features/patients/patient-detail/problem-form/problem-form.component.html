<h2 mat-dialog-title>Add Problem</h2>

<mat-dialog-content>
  <app-loading-spinner *ngIf="loading$ | async" [overlay]="true"></app-loading-spinner>

  <form [formGroup]="form" class="problem-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>ICD-10 Code *</mat-label>
      <input matInput formControlName="icd10Code"
             placeholder="e.g. I10, E11, J45.9"
             data-testid="icd10-input">
      <mat-error>{{ icd10Error }}</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Diagnosis Name *</mat-label>
      <input matInput formControlName="displayName"
             placeholder="e.g. Essential Hypertension"
             data-testid="display-name-input">
      <mat-error *ngIf="form.get('displayName')?.hasError('required')">Name is required.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Severity *</mat-label>
      <mat-select formControlName="severity" data-testid="severity-select">
        <mat-option *ngFor="let s of severities" [value]="s">
          <app-severity-badge [severity]="s"></app-severity-badge>
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status" data-testid="status-select">
        <mat-option value="ACTIVE">ACTIVE</mat-option>
        <mat-option value="INACTIVE">INACTIVE</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Onset Date</mat-label>
      <input matInput [matDatepicker]="onsetPicker" formControlName="onsetDate"
             [max]="today"
             data-testid="onset-date-input">
      <mat-datepicker-toggle matIconSuffix [for]="onsetPicker"></mat-datepicker-toggle>
      <mat-datepicker #onsetPicker></mat-datepicker>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary"
          [disabled]="form.invalid || (loading$ | async)"
          (click)="submit()"
          data-testid="submit-btn">
    Add Problem
  </button>
</mat-dialog-actions>
