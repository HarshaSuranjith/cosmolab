<h2 mat-dialog-title>Add Vital Signs</h2>

<mat-dialog-content>
  <app-loading-spinner *ngIf="loading$ | async" [overlay]="true"></app-loading-spinner>

  <form [formGroup]="form" class="vitals-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Recorded at</mat-label>
      <input matInput type="datetime-local" formControlName="recordedAt" data-testid="vitals-recorded-at">
    </mat-form-field>

    <div class="field-pair">
      <mat-form-field appearance="outline">
        <mat-label>Systolic BP (mmHg)</mat-label>
        <input matInput type="number" formControlName="systolicBp" data-testid="vitals-systolic">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Diastolic BP (mmHg)</mat-label>
        <input matInput type="number" formControlName="diastolicBp" data-testid="vitals-diastolic">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Heart Rate (bpm)</mat-label>
      <input matInput type="number" formControlName="heartRate" data-testid="vitals-heart-rate">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Respiratory Rate (/min)</mat-label>
      <input matInput type="number" formControlName="respiratoryRate" data-testid="vitals-resp-rate">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Temperature (°C)</mat-label>
      <input matInput type="number" step="0.1" formControlName="temperature" data-testid="vitals-temperature">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>SpO₂ (%)</mat-label>
      <input matInput type="number" step="0.1" formControlName="oxygenSaturation" data-testid="vitals-spo2">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Weight (kg)</mat-label>
      <input matInput type="number" step="0.1" formControlName="weight" data-testid="vitals-weight">
    </mat-form-field>

    <mat-error *ngIf="form.errors?.['atLeastOne']">
      At least one measurement must be provided.
    </mat-error>

    <p class="hint">* At least one measurement must be provided</p>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary"
          [disabled]="form.invalid || (loading$ | async)"
          (click)="submit()"
          data-testid="submit-btn">
    Save Reading
  </button>
</mat-dialog-actions>
