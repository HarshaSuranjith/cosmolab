server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: all non-asset requests go to index.html (HashLocationStrategy means
    # the hash is client-side, so no server-side routing needed — but this
    # handles any direct asset requests gracefully)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to WildFly backend
    location /api/ {
        proxy_pass         ${API_BASE_URL}/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy /actuator directly (Spring Boot actuator outside the /api prefix)
    location /actuator/ {
        proxy_pass         ${API_BASE_URL}/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Cache control for hashed assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
